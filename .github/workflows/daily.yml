name: Daily Regime Monitor

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas numpy requests python-dotenv matplotlib

      - name: Run experiment
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python run_experiment.py

      - name: List files after run
        run: |
          echo "Files in current directory:"
          ls -la
          echo "Checking for control_chart.png:"
          test -f control_chart.png && echo "✅ control_chart.png exists" || echo "❌ control_chart.png missing"

      - name: Commit and push results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-update: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push
