name: Daily Regime Monitor

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install pandas numpy requests python-dotenv matplotlib
          
      - name: Run experiment
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python run_experiment.py
          
      - name: Commit and push results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add state_history.csv control_chart.png t0_trigger.json 2>/dev/null || true
          git commit -m "Auto-update: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"
          git push